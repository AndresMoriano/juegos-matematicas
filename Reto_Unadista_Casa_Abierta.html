<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casa Abierta UNAD — Reto Unadista</title>
<style>
  :root{
    --navy:#0B1E45; --navy2:#132A5E; --navy3:#1B3A73;
    --gold:#D4AF37; --ice:#CFE0F5; --white:#FFFFFF;
    --green:#3FA66A; --red:#C0392B; --blue:#3E6BB0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--navy);
    font-family:Calibri,'Segoe UI',Arial,sans-serif; color:var(--white);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .ring{position:fixed; border-radius:50%; border:10px solid var(--gold); opacity:.9;}
  .ring1{width:420px;height:420px; left:-220px; top:-180px;}
  .ring2{width:340px;height:340px; right:-160px; bottom:-140px; border-color:var(--navy3); border-width:6px;}
  .app{
    position:relative; z-index:2; width:100%; max-width:760px;
    background:var(--navy2); border-radius:18px; padding:34px 38px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  h1{font-family:Cambria,Georgia,serif; font-size:30px; margin:0 0 6px;}
  .sub{color:var(--ice); font-style:italic; margin-bottom:22px; font-size:16px;}
  .bar-bg{background:var(--navy3); border-radius:10px; height:14px; overflow:hidden; margin-bottom:10px;}
  .bar-fill{background:var(--gold); height:100%; width:0%; transition:width .4s;}
  .meta{display:flex; justify-content:space-between; font-size:14px; color:var(--ice); margin-bottom:22px;}
  .score-chip{background:var(--navy3); border-radius:20px; padding:4px 14px; font-weight:bold; color:var(--gold);}
  .timer-wrap{background:var(--navy3); border-radius:10px; height:8px; overflow:hidden; margin-bottom:22px;}
  .timer-fill{background:var(--gold); height:100%; width:100%; transition:width 1s linear;}
  .qtype{display:inline-block; background:var(--navy3); color:var(--gold); font-size:12px; font-weight:bold;
    letter-spacing:1px; padding:4px 12px; border-radius:20px; margin-bottom:14px;}
  .question{font-size:22px; font-weight:bold; margin-bottom:22px; line-height:1.3;}
  .options{display:flex; flex-direction:column; gap:12px;}
  .opt{
    background:var(--navy3); border:2px solid transparent; color:var(--white);
    padding:16px 18px; border-radius:12px; font-size:17px; text-align:left;
    cursor:pointer; transition:all .15s;
  }
  .opt:hover:not(.locked){border-color:var(--gold); transform:translateY(-2px);}
  .opt.correct{background:var(--green); }
  .opt.incorrect{background:var(--red); }
  .tf-row{display:flex; gap:16px;}
  .tf-row .opt{flex:1; text-align:center; font-size:19px; font-weight:bold;}
  .match-wrap{display:flex; gap:24px;}
  .match-col{flex:1; display:flex; flex-direction:column; gap:10px;}
  .match-item{
    background:var(--navy3); padding:14px; border-radius:10px; cursor:pointer; font-size:15.5px;
    border:2px solid transparent; text-align:center;
  }
  .match-item.selected{border-color:var(--gold);}
  .match-item.matched{background:var(--green); cursor:default;}
  .match-item.wrong-flash{background:var(--red);}
  .feedback{margin-top:18px; font-size:15px; color:var(--ice); min-height:22px; font-style:italic;}
  .next-btn, .primary-btn{
    margin-top:20px; background:var(--gold); color:var(--navy); border:none;
    padding:14px 28px; border-radius:30px; font-size:16px; font-weight:bold; cursor:pointer;
    display:none;
  }
  .primary-btn{display:inline-block;}
  .next-btn:hover, .primary-btn:hover{filter:brightness(1.08);}
  .end-screen{text-align:center;}
  .end-emoji{font-size:60px; margin-bottom:6px;}
  .end-score{font-family:Cambria,Georgia,serif; font-size:44px; color:var(--gold); font-weight:bold; margin:6px 0;}
  .end-msg{font-size:18px; margin-bottom:26px; color:var(--ice);}
  .footer-note{margin-top:26px; font-size:11px; color:#6E86B8; text-align:center;}
  .start-screen{text-align:center;}
  .badge{display:inline-block; background:var(--navy3); color:var(--gold); font-weight:bold; font-size:13px;
    padding:6px 16px; border-radius:20px; margin-bottom:18px; letter-spacing:1px;}
</style>
</head>
<body>
<div class="ring ring1"></div>
<div class="ring ring2"></div>

<div class="app" id="app"></div>

<script>
const BANK = [
  {type:"mc", q:"¿Cuántos años de acreditación en Alta Calidad renovó la UNAD en 2026?", opts:["2 años","4 años","6 años","10 años"], answer:2},
  {type:"mc", q:"¿Qué escuela forma en Derecho y Ciencia Política?", opts:["ECJP","ECACEN","ECEDU","ECISA"], answer:0},
  {type:"mc", q:"¿Qué significa CIPAS?", opts:["Círculos de Interacción y Participación Académica y Social","Centro de Investigación y Práctica Académica Solidaria","Comité de Integración Profesional y Servicio Social","Consejo de Innovación y Proyección Académica"], answer:0},
  {type:"mc", q:"¿A qué escuela pertenece el semillero GUAMPI?", opts:["ECSAH","ECEDU","ECACEN","ECAPMA"], answer:1},
  {type:"mc", q:"¿Cuál de estas NO es una de las 3 secciones de Casa Abierta?", opts:["Vida Académica","Vida Universitaria","Plataforma Virtual","Vida Financiera"], answer:3},
  {type:"mc", q:"¿Qué escuela forma en Agronomía, Zootecnia e Ingeniería Ambiental?", opts:["ECAPMA","ECBTI","ECISA","ECSAH"], answer:0},
  {type:"mc", q:"¿Cómo se llama el servicio de acompañamiento psicológico en línea del Bienestar Integral?", opts:["Telepsicología","Nodos Virtuales","CIPAS","SISSU"], answer:0},
  {type:"mc", q:"¿Aproximadamente cuántos estudiantes tiene la UNAD en todo el país?", opts:["36.000","+360.000","3.600","36"], answer:1},
  {type:"mc", q:"¿Qué escuela ofrece Ingeniería de Sistemas e Ingeniería de Telecomunicaciones?", opts:["ECBTI","ECACEN","ECJP","ECEDU"], answer:0},
  {type:"mc", q:"¿Qué sistema conecta tu carrera con proyectos reales de tu comunidad desde el primer semestre?", opts:["SISSU","VIACI","Campus Virtual","App UNAD"], answer:0},
  {type:"mc", q:"¿Qué herramienta organiza todo tu semestre en un solo lugar?", opts:["App UNAD","Campus Virtual","Nodos Virtuales","SIGII"], answer:1},
  {type:"mc", q:"La UDR Valle del Guamuez pertenece a:", opts:["Zona Centro","Zona Sur","Zona Caribe","Zona Occidente"], answer:1},

  {type:"tf", q:"La UNAD es la primera universidad 100% virtual acreditada en Alta Calidad en Colombia.", answer:true},
  {type:"tf", q:"Para estudiar en la UNAD debes desplazarte todos los días a un salón de clases.", answer:false},
  {type:"tf", q:"El Bienestar Integral Unadista solo se enfoca en las notas académicas.", answer:false},
  {type:"tf", q:"La Cátedra Región es parte del Servicio Social Unadista (SISSU).", answer:true},
  {type:"tf", q:"ECSAH es la escuela de Ciencias Sociales, Artes y Humanidades.", answer:true},
  {type:"tf", q:"La UNAD solo tiene presencia en las grandes ciudades de Colombia.", answer:false},
  {type:"tf", q:"Los CIPAS pueden ser liderados tanto por docentes como por estudiantes.", answer:true},
  {type:"tf", q:"En la UNAD no existe ningún tipo de acompañamiento docente.", answer:false},

  {type:"match", q:"Relaciona cada escuela con su campo de formación:",
    pairs:[["ECSAH","Ciencias Sociales, Artes y Humanidades"],["ECISA","Ciencias de la Salud"],["ECACEN","Negocios y Administración"],["ECAPMA","Ciencias Agrícolas y Ambiente"]]},
  {type:"match", q:"Relaciona cada semillero con su escuela:",
    pairs:[["Transformando Territorio","ECSAH"],["GUAMPI","ECEDU"],["Gestión Empresarial Sostenible","ECACEN"]]},
  {type:"match", q:"Relaciona cada línea de Bienestar con su función:",
    pairs:[["Telepsicología","Salud mental en línea"],["Nodos Virtuales","Contenidos siempre disponibles"],["Deporte y cultura","Actividad física y arte"]]},
  {type:"match", q:"Relaciona cada herramienta virtual con su uso:",
    pairs:[["Campus Virtual","Organiza todo tu semestre"],["App UNAD","Estudia desde tu celular"],["Encuentros en vivo","Tutorías por videollamada"]]},
  {type:"match", q:"Relaciona cada elemento del SISSU con su definición:",
    pairs:[["Cátedra Social Solidaria","Formación en valores desde el 1er semestre"],["Cátedra Región","Aprender con la realidad de tu territorio"],["Práctica con impacto","Práctica profesional real"]]},
];

let session = [];
let idx = 0;
let score = 0;
let timerInterval = null;
const TIME_PER_Q = 20;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startGame(){
  session = shuffle(BANK).slice(0,10);
  idx = 0; score = 0;
  renderQuestion();
}

function renderStart(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="start-screen">
      <div class="badge">CASA ABIERTA · UDR VALLE DEL GUAMUEZ</div>
      <h1>🎓 Reto Unadista</h1>
      <p class="sub">Pon a prueba lo que aprendiste hoy sobre la UNAD. 10 preguntas, banco de 25, ¡cada partida es distinta!</p>
      <button class="primary-btn" onclick="startGame()">Comenzar reto</button>
      <div class="footer-note">UDR Valle del Guamuez · Zona Sur UNAD</div>
    </div>`;
}

function stopTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }

function startTimer(onTimeout){
  let t = TIME_PER_Q;
  const fill = document.getElementById("timerFill");
  stopTimer();
  timerInterval = setInterval(()=>{
    t -= 1;
    if(fill) fill.style.width = (t/TIME_PER_Q*100)+"%";
    if(t<=0){ stopTimer(); onTimeout(); }
  },1000);
}

function renderQuestion(){
  const app = document.getElementById("app");
  const q = session[idx];
  const progressPct = (idx/session.length)*100;

  app.innerHTML = `
    <div class="meta">
      <span>Pregunta ${idx+1} de ${session.length}</span>
      <span class="score-chip">⭐ ${score} pts</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${progressPct}%"></div></div>
    <div class="timer-wrap"><div class="timer-fill" id="timerFill"></div></div>
    <div class="qtype">${q.type==='mc'?'OPCIÓN MÚLTIPLE':q.type==='tf'?'VERDADERO O FALSO':'RELACIONA'}</div>
    <div class="question">${q.q}</div>
    <div id="qbody"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
  `;

  const body = document.getElementById("qbody");

  if(q.type==="mc"){
    body.innerHTML = `<div class="options">` + q.opts.map((o,i)=>
      `<button class="opt" data-i="${i}" onclick="answerMC(${i})">${o}</button>`
    ).join("") + `</div>`;
  } else if(q.type==="tf"){
    body.innerHTML = `<div class="tf-row">
      <button class="opt" onclick="answerTF(true)">✅ Verdadero</button>
      <button class="opt" onclick="answerTF(false)">❌ Falso</button>
    </div>`;
  } else if(q.type==="match"){
    renderMatch(body, q);
  }

  startTimer(()=>{ handleTimeout(); });
}

function lockOptions(){
  document.querySelectorAll(".opt").forEach(b=>{ b.classList.add("locked"); b.onclick=null; });
}

function showNext(){ document.getElementById("nextBtn").style.display="inline-block"; }

function handleTimeout(){
  const q = session[idx];
  document.getElementById("feedback").textContent = "⏰ ¡Se acabó el tiempo! Sigamos.";
  if(q.type!=="match") lockOptions();
  showNext();
}

function answerMC(i){
  stopTimer();
  const q = session[idx];
  const buttons = document.querySelectorAll(".opt");
  buttons.forEach(b=>b.onclick=null);
  buttons[i].classList.add(i===q.answer?"correct":"incorrect");
  if(i!==q.answer) buttons[q.answer].classList.add("correct");
  if(i===q.answer){ score++; document.getElementById("feedback").textContent = "🎉 ¡Correcto!"; }
  else{ document.getElementById("feedback").textContent = "No era esa — ¡sigue así!"; }
  showNext();
}

function answerTF(val){
  stopTimer();
  const q = session[idx];
  const buttons = document.querySelectorAll(".opt");
  buttons.forEach(b=>b.onclick=null);
  const correctIdx = q.answer===true?0:1;
  const chosenIdx = val===true?0:1;
  buttons[chosenIdx].classList.add(chosenIdx===correctIdx?"correct":"incorrect");
  if(chosenIdx!==correctIdx) buttons[correctIdx].classList.add("correct");
  if(chosenIdx===correctIdx){ score++; document.getElementById("feedback").textContent = "🎉 ¡Correcto!"; }
  else{ document.getElementById("feedback").textContent = "No era así — ¡vamos con la siguiente!"; }
  showNext();
}

function renderMatch(container, q){
  const lefts = q.pairs.map(p=>p[0]);
  const rights = shuffle(q.pairs.map(p=>p[1]));
  let selectedLeft = null;
  let matchedCount = 0;
  let wrongTries = 0;

  container.innerHTML = `<div class="match-wrap">
    <div class="match-col" id="leftCol">${lefts.map((l,i)=>`<div class="match-item" data-l="${i}">${l}</div>`).join("")}</div>
    <div class="match-col" id="rightCol">${rights.map((r,i)=>`<div class="match-item" data-r="${i}">${r}</div>`).join("")}</div>
  </div>`;

  const leftEls = container.querySelectorAll("[data-l]");
  const rightEls = container.querySelectorAll("[data-r]");

  leftEls.forEach(el=>{
    el.addEventListener("click", ()=>{
      if(el.classList.contains("matched")) return;
      leftEls.forEach(e=>e.classList.remove("selected"));
      el.classList.add("selected");
      selectedLeft = el;
    });
  });

  rightEls.forEach(el=>{
    el.addEventListener("click", ()=>{
      if(el.classList.contains("matched") || !selectedLeft) return;
      const leftText = selectedLeft.textContent;
      const rightText = el.textContent;
      const correctPair = q.pairs.some(p=>p[0]===leftText && p[1]===rightText);
      if(correctPair){
        selectedLeft.classList.add("matched"); selectedLeft.classList.remove("selected");
        el.classList.add("matched");
        matchedCount++;
        selectedLeft = null;
        if(matchedCount===q.pairs.length){
          stopTimer();
          score++;
          document.getElementById("feedback").textContent = "🎉 ¡Relación perfecta!";
          showNext();
        }
      } else {
        el.classList.add("wrong-flash");
        wrongTries++;
        setTimeout(()=>el.classList.remove("wrong-flash"),400);
      }
    });
  });
}

function nextQuestion(){
  idx++;
  if(idx>=session.length){ renderEnd(); }
  else{ renderQuestion(); }
}

function renderEnd(){
  stopTimer();
  const app = document.getElementById("app");
  const pct = Math.round((score/session.length)*100);
  let emoji="🌱", msg="¡Buen comienzo! Repasa la presentación y vuelve a intentarlo.";
  if(pct>=80){ emoji="🏆"; msg="¡Excelente! Ya conoces muy bien la UNAD y la Casa Abierta."; }
  else if(pct>=50){ emoji="🎯"; msg="¡Vas muy bien! Un repaso más y lo tienes todo."; }

  app.innerHTML = `
    <div class="end-screen">
      <div class="end-emoji">${emoji}</div>
      <div class="end-score">${score} / ${session.length}</div>
      <div class="end-msg">${msg}</div>
      <button class="primary-btn" onclick="startGame()">Jugar de nuevo</button>
      <div class="footer-note">Casa Abierta · UDR Valle del Guamuez · Banco de 25 preguntas</div>
    </div>`;
}

renderStart();
</script>
</body>
</html>
